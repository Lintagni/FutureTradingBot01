version: '3.8'

services:
  bot:
    build: .
    container_name: trading-bot
    volumes:
      - ./.env:/app/.env
      - ./trading.db:/app/trading.db
    ports:
      - "3000:3000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
