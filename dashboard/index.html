<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

// ─── RESPONSIVE ───────────────────────────────────────────────────────────────
function useWindowSize() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const handler = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return size;
}

// ─── THEMES ──────────────────────────────────────────────────────────────────
const THEMES = {

    accent:'#00c9b1', accentDim:'rgba(0,201,177,0.12)', accent2:'#f59e0b', accent2Dim:'rgba(245,158,11,0.12)',

    navActive:'linear-gradient(90deg,rgba(0,201,177,0.18) 0%,rgba(0,201,177,0.04) 100%)',
  },
  terminal: {

    accent:'#00ff88', accentDim:'rgba(0,255,136,0.08)', accent2:'#00d4ff', accent2Dim:'rgba(0,212,255,0.08)',
    text:'#cccccc', textMuted:'#444', textDim:'#777',
    green:'#00ff88', greenDim:'rgba(0,255,136,0.08)', red:'#ff3355', redDim:'rgba(255,51,85,0.08)',
    navActive:'linear-gradient(90deg,rgba(0,255,136,0.14) 0%,rgba(0,255,136,0.02) 100%)',
  },
  carbon: {
    name:'Carbon', bg:'#0a0a10', sidebar:'#0d0d16', sidebarBorder:'#1c1c2e',

    accent:'#8b5cf6', accentDim:'rgba(139,92,246,0.12)', accent2:'#ec4899', accent2Dim:'rgba(236,72,153,0.12)',
    text:'#e2e0f0', textMuted:'#4a4868', textDim:'#7b789a',
    green:'#34d399', greenDim:'rgba(52,211,153,0.12)', red:'#fb7185', redDim:'rgba(251,113,133,0.12)',
    navActive:'linear-gradient(90deg,rgba(139,92,246,0.18) 0%,rgba(139,92,246,0.04) 100%)',
  }
};

// ─── LIVE DATA ────────────────────────────────────────────────────────────────
function normSym(s) { return s ? s.split('/')[0] + 'USDT' : ''; }
function fmtDur(a, b) { const ms=new Date(b)-new Date(a),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return h>0?`${h}h ${m}m`:`${m}m`; }
function mapTrade(t) {
  return {
    id: t.id,
    time: new Date(t.entryTime).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}),
    rawDate: t.entryTime,
    symbol: normSym(t.symbol),
    side: t.side==='buy'?'Long':'Short',
    entry: t.entryPrice||t.price||0,
    exit: t.exitPrice||null,
    pnl: t.realizedPnl||0,
    duration: t.exitTime ? fmtDur(t.entryTime,t.exitTime) : 'Open',
    leverage: (t.leverage||3)+'x',
    confidence: Math.round((t.confidence||0.65)*100),
    reason: t.signal||t.strategy||'',
    status: t.status,
  };
}
function mapPosition(pos, leverage) {
  return {
    symbol: normSym(pos.symbol),
    dir: pos.side==='buy'?'Long':'Short',
    entry: pos.entryPrice||0,
    curPrice: pos.currentPrice||0,
    size: '—',
    pnl: pos.unrealizedPnl||0,
    pct: (pos.pnlPct||0)*100,
    liq: '—',
    leverage: (leverage||3)+'x',
    opened: '—',
    margin: '—',
  };
}

function useLiveData() {
  const [status, setStatus] = useState(null);
  const [trades, setTrades] = useState([]);
  const [liveLogs, setLiveLogs] = useState([]);
  const [wsConnected, setWsConnected] = useState(false);

  // WebSocket
  useEffect(() => {
    const proto = location.protocol==='https:'?'wss':'ws';
    let ws, pingTimer, reconnectTimer;
    function connect() {
      ws = new WebSocket(`${proto}://${location.host}`);
      ws.onopen = () => { setWsConnected(true); clearTimeout(reconnectTimer); };
      ws.onclose = () => { setWsConnected(false); clearInterval(pingTimer); reconnectTimer = setTimeout(connect, 4000); };
      ws.onerror = () => {};
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type==='state') setStatus(msg.data);
          if (msg.type==='log') {
            const lvl = msg.data.level||'info';
            const type = lvl==='error'?'system':lvl==='warn'?'system':msg.data.msg?.includes('opened')||msg.data.msg?.includes('closed')?'trade':lvl==='info'&&msg.data.msg?.includes('AI')?'ai':'info';
            setLiveLogs(prev => [{t:new Date().toLocaleTimeString('en-US',{hour12:false}),type,msg:msg.data.msg},...prev].slice(0,150));
          }
        } catch(_) {}
      };
      pingTimer = setInterval(() => { if(ws&&ws.readyState===WebSocket.OPEN) ws.ping&&ws.ping(); }, 10000);
    }
    connect();
    return () => { clearTimeout(reconnectTimer); clearInterval(pingTimer); try{ws&&ws.close();}catch(_){} };
  }, []);

  // REST status fallback
  useEffect(() => {
    async function poll() { try { const r=await fetch('/api/status'); if(r.ok) setStatus(await r.json()); } catch(_){} }
    poll();
    const id = setInterval(poll, 8000);
    return () => clearInterval(id);
  }, []);

  // Fetch trades
  useEffect(() => {
    async function fetchTrades() { try { const r=await fetch('/api/trades?limit=100'); if(r.ok) setTrades((await r.json()).map(mapTrade)); } catch(_){} }
    fetchTrades();
    const id = setInterval(fetchTrades, 15000);
    return () => clearInterval(id);
  }, []);

  return { status, trades, liveLogs, wsConnected };
}

// ─── HOOKS ────────────────────────────────────────────────────────────────────
function useAnimatedNumber(target, decimals=2, duration=800) {
  const [display, setDisplay] = useState(target);
  const startRef = useRef(target);
  const frameRef = useRef(null);
  useEffect(() => {
    const start = startRef.current;
    const diff = target - start;
    if (Math.abs(diff) < 0.01) return;
    const t0 = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now-t0)/duration);
      const ease = 1-Math.pow(1-p,3);
      setDisplay(+(start + diff*ease).toFixed(decimals));
      if (p < 1) frameRef.current = requestAnimationFrame(tick);
      else startRef.current = target;
    };
    frameRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(frameRef.current);
  }, [target]);
  return display;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(n,dec=2) { return (n>=0?'+':'-')+'$'+Math.abs(n).toFixed(dec); }
function fmtPct(n) { return (n>=0?'+':'')+n.toFixed(2)+'%'; }
function numFmt(n) { return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ─── PRIMITIVES ──────────────────────────────────────────────────────────────
function StatusDot({active,t}) {
  return <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:active?t.green:t.textMuted,boxShadow:active?`0 0 6px ${t.green}`:'none',animation:active?'pulse 2s infinite':'none',flexShrink:0}}/>;
}

function Badge({children,color,t}) {
  const c = color==='green'?t.green:color==='red'?t.red:t.accent;
  return <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',padding:'2px 7px',borderRadius:3,background:c+'1a',color:c,border:`1px solid ${c}33`,textTransform:'uppercase'}}>{children}</span>;
}

function Sparkline({data,color,width=80,height=28}) {
  if (!data||data.length<2) return null;
  const min=Math.min(...data), max=Math.max(...data), range=max-min||1;
  const pts = data.map((v,i)=>[
    (i/(data.length-1))*width,
    height - ((v-min)/range)*height*0.85 - height*0.075
  ]);
  const d = pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const fill = `${d} L${width},${height} L0,${height} Z`;
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={`url(#sg-${color.replace('#','')})`}/>
      <path d={d} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function StatCard({label,value,sub,delta,accent,t,spark,sparkColor}) {
  const pos = delta!==undefined ? delta>=0 : null;
  const col = accent ? (pos===false?t.red:pos===true?t.green:t.text) : t.text;
  return (
    <div className="animate-in" style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'16px 18px',display:'flex',flexDirection:'column',gap:6,transition:'background 0.18s',cursor:'default'}}
      onMouseEnter={e=>e.currentTarget.style.background=t.cardHover}
      onMouseLeave={e=>e.currentTarget.style.background=t.card}>
      <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.1em',color:t.textMuted,textTransform:'uppercase'}}>{label}</div>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:col,letterSpacing:'-0.02em',lineHeight:1}}>{value}</div>
          {sub && <div style={{fontSize:11,color:t.textDim,marginTop:4}}>{sub}</div>}
        </div>
        {spark && <Sparkline data={spark} color={sparkColor||col} width={80} height={38}/>}
      </div>
    </div>
  );
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function PnLChart({trades,t}) {
  const ref=useRef(null), chart=useRef(null), tRef=useRef(t);

  function buildGradient(ctx, color) {
    const g=ctx.createLinearGradient(0,0,0,ctx.canvas.offsetHeight||200);
    g.addColorStop(0,color+'55');
    g.addColorStop(0.6,color+'18');
    g.addColorStop(1,color+'00');
    return g;
  }

  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current){chart.current.destroy();chart.current=null;}
    tRef.current=t;
    chart.current=new Chart(ref.current,{
      type:'line',
      data:{labels:[],datasets:[{
        data:[],
        borderColor:t.green,
        borderWidth:2,
        fill:true,
        backgroundColor:(ctx)=>buildGradient(ctx.chart.ctx,t.green),
        tension:0.4,
        pointRadius:3,
        pointBackgroundColor:t.green,
        pointBorderColor:t.card,
        pointBorderWidth:1.5,
        pointHoverRadius:5,
        pointHoverBackgroundColor:t.green,
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,animation:{duration:500},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:t.card,borderColor:t.border,borderWidth:1,
            titleColor:t.textDim,bodyColor:t.green,padding:10,cornerRadius:8,
            callbacks:{label:ctx=>` $${(+ctx.raw).toFixed(2)}`}}
        },
        scales:{
          x:{grid:{color:t.border+'33',drawBorder:false},ticks:{color:t.textMuted,font:{size:10},maxTicksLimit:10}},
          y:{grid:{color:t.border+'33',drawBorder:false},ticks:{color:t.textMuted,font:{size:10},callback:v=>'$'+v},
             beginAtZero:false}
        }
      }
    });
    return()=>{try{chart.current?.destroy();}catch(_){}chart.current=null;};
  },[t]);

  useEffect(()=>{
    if(!chart.current) return;
    const sorted=[...trades].slice(0,20).reverse();
    let cum=0;
    const cumData=sorted.map(tr=>{cum+=tr.pnl;return+cum.toFixed(2);});
    const th=tRef.current;
    const finalVal=cumData[cumData.length-1]??0;
    const lineColor=finalVal>=0?th.green:th.red;
    // Per-dot coloring: green dot = that trade was profit, red = loss
    const dotColors=sorted.map(tr=>tr.pnl>0?th.green:th.red);
    chart.current.data.labels=sorted.map(tr=>tr.symbol.replace('USDT',''));
    chart.current.data.datasets[0].data=cumData;
    chart.current.data.datasets[0].borderColor=lineColor;
    chart.current.data.datasets[0].pointBackgroundColor=dotColors;
    chart.current.data.datasets[0].pointBorderColor=dotColors.map(c=>c+'66');
    chart.current.data.datasets[0].pointRadius=sorted.map(()=>4);
    chart.current.data.datasets[0].pointHoverRadius=7;
    chart.current.data.datasets[0].backgroundColor=(ctx)=>buildGradient(ctx.chart.ctx,lineColor);
    chart.current.update('none');
  },[trades]);

  return <canvas ref={ref} style={{width:'100%',height:'100%'}}/>;
}

function DirectionChart({t,trades=[]}) {
  const ref=useRef(null),chart=useRef(null),tRef=useRef(t);
  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current){chart.current.destroy();chart.current=null;}
    tRef.current=t;
    chart.current=new Chart(ref.current,{
      type:'bar',
      data:{labels:['Long Wins','Long Loss','Short Wins','Short Loss'],datasets:[{data:[0,0,0,0],backgroundColor:[t.green+'cc',t.red+'cc',t.green+'88',t.red+'88'],borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{backgroundColor:t.card,borderColor:t.border,borderWidth:1,bodyColor:t.text,callbacks:{label:ctx=>` $${(+ctx.raw).toFixed(2)}`}}},
        scales:{x:{grid:{display:false},ticks:{color:t.textMuted,font:{size:10}}},y:{grid:{color:t.border+'44'},ticks:{color:t.textMuted,font:{size:10},callback:v=>'$'+v}}}}
    });
    return()=>{try{chart.current?.destroy();}catch(_){}chart.current=null;};
  },[t]);
  useEffect(()=>{
    if(!chart.current) return;
    const lw=trades.filter(x=>x.side==='Long'&&x.pnl>0).reduce((a,b)=>a+b.pnl,0);
    const ll=trades.filter(x=>x.side==='Long'&&x.pnl<0).reduce((a,b)=>a+Math.abs(b.pnl),0);
    const sw=trades.filter(x=>x.side==='Short'&&x.pnl>0).reduce((a,b)=>a+b.pnl,0);
    const sl=trades.filter(x=>x.side==='Short'&&x.pnl<0).reduce((a,b)=>a+Math.abs(b.pnl),0);
    chart.current.data.datasets[0].data=[lw,ll,sw,sl];
    chart.current.update('none');
  },[trades]);
  return <canvas ref={ref} style={{width:'100%',height:'100%'}}/>;
}

function WinRateChart({t,trades=[]}) {
  const ref=useRef(null),chart=useRef(null),tRef=useRef(t);
  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current){chart.current.destroy();chart.current=null;}
    tRef.current=t;
    chart.current=new Chart(ref.current,{
      type:'doughnut',
      data:{labels:['Wins','Losses'],datasets:[{data:[0,1],backgroundColor:[t.green+'cc',t.border],borderColor:[t.green+'44',t.border],borderWidth:1.5,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{backgroundColor:t.card,borderColor:t.border,borderWidth:1,bodyColor:t.text}}}
    });
    return()=>{try{chart.current?.destroy();}catch(_){}chart.current=null;};
  },[t]);
  useEffect(()=>{
    if(!chart.current) return;
    const wins=trades.filter(tr=>tr.pnl>0).length;
    chart.current.data.datasets[0].data=[wins,Math.max(0,trades.length-wins)];
    chart.current.update('none');
  },[trades]);
  return <canvas ref={ref} style={{width:'100%',height:'100%'}}/>;
}

function HeatmapCalendar({t,trades=[]}) {
  const heatmap = useMemo(()=>{
    const map={};
    trades.forEach(tr=>{ if(!tr.rawDate) return; const d=new Date(tr.rawDate).toDateString(); map[d]=(map[d]||0)+tr.pnl; });
    const days=[];
    for(let i=89;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push({date:d,pnl:+(map[d.toDateString()]||0).toFixed(2)}); }
    return days;
  },[trades]);
  const max=Math.max(...heatmap.map(d=>Math.abs(d.pnl)),1);
  const [hovered,setHovered]=useState(null);
  const weeks=[]; let week=[];
  heatmap.forEach((d,i)=>{ week.push(d); if(week.length===7||i===heatmap.length-1){weeks.push(week);week=[];} });

  function cellColor(pnl) {
    if(pnl===0) return t.border;
    const intensity=Math.abs(pnl)/max;
    return pnl>0
      ? `oklch(${0.45+intensity*0.25} 0.18 150)`
      : `oklch(${0.45+intensity*0.25} 0.18 15)`;
  }
  const monthLabels=[];
  weeks.forEach((w,wi)=>{ if(wi===0||w[0].date.getDate()<=7){ monthLabels[wi]=w[0].date.toLocaleString('en',{month:'short'}); } });

  return (
    <div>
      <div style={{display:'flex',gap:2,marginBottom:6}}>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{fontSize:9,color:t.textMuted,width:14,textAlign:'center'}}>{monthLabels[wi]||''}</div>
        ))}
      </div>
      <div style={{display:'flex',gap:2}}>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{display:'flex',flexDirection:'column',gap:2}}>
            {w.map((d,di)=>(
              <div key={di}
                style={{width:14,height:14,borderRadius:2.5,background:cellColor(d.pnl),cursor:'default',transition:'transform 0.1s',position:'relative'}}
                onMouseEnter={e=>setHovered({d,x:e.clientX,y:e.clientY})}
                onMouseLeave={()=>setHovered(null)}
              />
            ))}
          </div>
        ))}
      </div>
      {hovered && (
        <div style={{position:'fixed',left:hovered.x+10,top:hovered.y-40,background:t.card,border:`1px solid ${t.border}`,borderRadius:6,padding:'6px 10px',fontSize:11,color:t.text,zIndex:1000,pointerEvents:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.4)'}}>
          <div style={{color:t.textMuted,fontSize:10}}>{hovered.d.date.toLocaleDateString('en',{month:'short',day:'numeric'})}</div>
          <div style={{fontWeight:700,color:hovered.d.pnl>=0?t.green:t.red}}>{fmt(hovered.d.pnl)}</div>
        </div>
      )}
      <div style={{display:'flex',gap:4,alignItems:'center',marginTop:8}}>
        <span style={{fontSize:10,color:t.textMuted}}>Less</span>
        {[-1,-0.5,0,0.5,1].map(v=>(
          <div key={v} style={{width:10,height:10,borderRadius:2,background:v===0?t.border:v>0?`oklch(${0.45+v*0.25} 0.18 150)`:`oklch(${0.45+Math.abs(v)*0.25} 0.18 15)`}}/>
        ))}
        <span style={{fontSize:10,color:t.textMuted}}>More</span>
      </div>
    </div>
  );
}

// ─── TRADE DRAWER ─────────────────────────────────────────────────────────────
function TradeDrawer({trade,t,onClose}) {
  if(!trade) return null;
  const pnlColor = trade.pnl>=0?t.green:t.red;
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',justifyContent:'flex-end'}} onClick={onClose}>
      <div className="drawer-enter" style={{width:380,height:'100%',background:t.sidebar,borderLeft:`1px solid ${t.border}`,padding:28,overflowY:'auto',display:'flex',flexDirection:'column',gap:20}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:t.text}}>{trade.symbol}</div>
            <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>{trade.time} · {trade.duration}</div>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:`1px solid ${t.border}`,borderRadius:6,color:t.textMuted,width:32,height:32,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>

        {/* P&L hero */}
        <div style={{background:trade.pnl>=0?t.greenDim:t.redDim,border:`1px solid ${pnlColor}33`,borderRadius:12,padding:'20px',textAlign:'center'}}>
          <div style={{fontSize:36,fontWeight:800,color:pnlColor,letterSpacing:'-0.03em'}}>{fmt(trade.pnl)}</div>
          <div style={{fontSize:12,color:t.textDim,marginTop:4}}>Realized P&L</div>
        </div>

        {/* Details grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[
            {l:'Side',      v:<Badge color={trade.side==='Long'?'green':'red'} t={t}>{trade.side}</Badge>},
            {l:'Leverage',  v:<span style={{color:t.accent,fontWeight:700,fontFamily:'monospace'}}>{trade.leverage}</span>},
            {l:'Entry',     v:`$${trade.entry.toLocaleString()}`},
            {l:'Exit',      v:`$${trade.exit.toLocaleString()}`},
            {l:'Duration',  v:trade.duration},
            {l:'Symbol',    v:trade.symbol},
          ].map((row,i)=>(
            <div key={i} style={{background:t.card,borderRadius:8,padding:'12px',border:`1px solid ${t.border}`}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{row.l}</div>
              <div style={{fontSize:13,fontWeight:600,color:t.text}}>{row.v}</div>
            </div>
          ))}
        </div>

        {/* AI confidence */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'16px'}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>AI Signal</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:13,color:t.textDim}}>Confidence</span>
            <span style={{fontSize:18,fontWeight:800,color:trade.confidence>=70?t.green:t.accent}}>{trade.confidence}%</span>
          </div>
          <div style={{height:4,background:t.border,borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:trade.confidence+'%',background:trade.confidence>=70?t.green:t.accent,borderRadius:2}}/>
          </div>
          <div style={{fontSize:12,color:t.textDim,marginTop:12,lineHeight:1.5,fontStyle:'italic'}}>"{trade.reason}"</div>
        </div>

        {/* Price move */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'16px'}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Price Movement</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:10,color:t.textMuted,marginBottom:3}}>Entry</div>
              <div style={{fontSize:14,fontWeight:700,color:t.text,fontFamily:'monospace'}}>${trade.entry.toLocaleString()}</div>
            </div>
            <div style={{flex:1,display:'flex',justifyContent:'center'}}>
              <div style={{fontSize:18,color:pnlColor}}>→</div>
            </div>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:10,color:t.textMuted,marginBottom:3}}>Exit</div>
              <div style={{fontSize:14,fontWeight:700,color:pnlColor,fontFamily:'monospace'}}>${trade.exit.toLocaleString()}</div>
            </div>
          </div>
          <div style={{marginTop:12,textAlign:'center',fontSize:13,fontWeight:700,color:pnlColor}}>
            {fmtPct(((trade.exit-trade.entry)/trade.entry)*100*3)} (3× leveraged)
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CLOSE POSITION MODAL ────────────────────────────────────────────────────

        <div style={{fontSize:13,color:t.textDim,marginBottom:20}}>Close {pos.dir} on <strong style={{color:t.text}}>{pos.symbol}</strong> at market price?</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div><div style={{fontSize:10,color:t.textMuted}}>Entry</div><div style={{fontWeight:700,color:t.text,fontFamily:'monospace'}}>${numFmt(pos.entry)}</div></div>
            <div><div style={{fontSize:10,color:t.textMuted}}>Mark</div><div style={{fontWeight:700,color:t.text,fontFamily:'monospace'}}>${numFmt(pos.curPrice)}</div></div>
            <div><div style={{fontSize:10,color:t.textMuted}}>Unrealized P&L</div><div style={{fontWeight:700,color:pos.pnl>=0?t.green:t.red}}>{fmt(pos.pnl)}</div></div>

// ─── TABLE HELPER ────────────────────────────────────────────────────────────
function Table({t,columns,rows,renderRow}) {
  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{borderBottom:`1px solid ${t.border}`}}>
            {columns.map(c=><th key={c} style={{padding:'8px 12px',textAlign:'left',color:t.textMuted,fontWeight:600,fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{c}</th>)}
          </tr>
        </thead>
        <tbody>{rows.map((row,i)=>renderRow(row,i,t))}</tbody>
      </table>
    </div>
  );
}

// ─── SECTIONS ────────────────────────────────────────────────────────────────
function DashboardSection({t,setPage,status,trades,wsConnected,isMobile}) {
  const closedTrades = trades.filter(tr=>tr.status==='closed');
  const totalPnL = status?.totalPnL ?? 0;
  const dailyPnL = status?.dailyPnL ?? 0;
  const balance = Object.values(status?.walletBalances||{})[0] ?? 0;
  const winRate = (status?.lifetimeWinRate ?? 0).toFixed(1);
  const wins = closedTrades.filter(tr=>tr.pnl>0).length;

  const liveBalance = useAnimatedNumber(balance, 2, 600);
  const livePnL     = useAnimatedNumber(dailyPnL, 2, 600);

  // Sparkline data derived from trade history
  const cumSpark = useMemo(()=>{
    let c=0; return [...closedTrades].reverse().map(tr=>{c+=tr.pnl;return c;});
  },[closedTrades]);
  const winSpark = useMemo(()=>{
    let wins=0,total=0;
    return [...closedTrades].reverse().map(tr=>{total++;if(tr.pnl>0)wins++;return total>0?wins/total*100:0;});
  },[closedTrades]);

  const card={background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'20px'};
  const [drawerTrade,setDrawerTrade]=useState(null);
  const positions = (status?.positionDetails||[]).map(p=>mapPosition(p, status?.leverage));

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(6,1fr)',gap:isMobile?10:12}}>
        <StatCard t={t} label="USDT Balance" value={`$${liveBalance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`} sub={status?.mode==='paper'?'Paper account':'Live account'} spark={cumSpark} sparkColor={(cumSpark[cumSpark.length-1]??0)>=0?t.green:t.red}/>
        <StatCard t={t} label="Daily P&L" value={fmt(livePnL)} sub="Today" accent delta={livePnL} spark={cumSpark} sparkColor={livePnL>=0?t.green:t.red}/>
        <StatCard t={t} label="Total P&L" value={fmt(totalPnL)} sub="All time" accent delta={totalPnL} spark={cumSpark} sparkColor={totalPnL>=0?t.green:t.red}/>
        <StatCard t={t} label="Win Rate" value={winRate+'%'} sub={`${wins}/${closedTrades.length} trades`} spark={winSpark} sparkColor={t.accent}/>
        <StatCard t={t} label="Open Positions" value={status?.openPositions??0} sub={`${status?.leverage??3}× isolated`}/>
        <StatCard t={t} label="Monitored Pairs" value={status?.monitoredPairs?.length??0} sub="Active pairs"/>
      </div>

      {/* Live indicator */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:-6}}>
        <StatusDot active={wsConnected} t={t}/>
        <span style={{fontSize:11,color:wsConnected?t.green:t.textMuted}} className="live-shimmer">{wsConnected?'Live — WebSocket connected':'Polling every 8s'}</span>
      </div>

      {/* Charts row */}
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 320px',gap:16}}>
        <div style={card}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase'}}>Cumulative P&L</div>
              <div style={{fontSize:22,fontWeight:700,color:totalPnL>=0?t.green:t.red,marginTop:4}}>{fmt(totalPnL)}</div>
            </div>
            <Badge color="green" t={t}>Last 20 Trades</Badge>
          </div>
          <div style={{height:isMobile?140:170}}><PnLChart trades={closedTrades} t={t}/></div>
        </div>
        <div style={card}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>Open Positions</div>
          {positions.length===0 && <div style={{padding:'20px',textAlign:'center',color:t.textMuted,fontSize:13}}>No open positions</div>}
          {positions.map((pos,i)=>(
            <div key={i} style={{padding:'11px 0',borderBottom:i<positions.length-1?`1px solid ${t.border}`:'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span style={{fontWeight:700,color:t.text,fontSize:13}}>{pos.symbol.replace('USDT','')}</span>
                  <Badge color={pos.dir==='Long'?'green':'red'} t={t}>{pos.dir}</Badge>
                  <span style={{fontSize:10,color:t.textMuted}}>{pos.leverage}</span>
                </div>
                <span style={{fontWeight:700,color:pos.pnl>=0?t.green:t.red,fontSize:13}}>{fmt(pos.pnl)}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3}}>
                <div style={{fontSize:11,color:t.textDim}}>Entry <span style={{color:t.text}}>${numFmt(pos.entry)}</span></div>
                <div style={{fontSize:11,color:t.textDim}}>Mark <span style={{color:t.text}}>${numFmt(pos.curPrice)}</span></div>
              </div>
              <div style={{marginTop:6,height:3,borderRadius:2,background:t.border,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min(100,Math.abs(pos.pct)*50)}%`,background:pos.pnl>=0?t.green:t.red,borderRadius:2}}/>
              </div>
            </div>
          ))}
          <button onClick={()=>setPage('positions')} style={{marginTop:14,width:'100%',padding:'8px',borderRadius:6,border:`1px solid ${t.border}`,background:'transparent',color:t.textMuted,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=t.accent;e.currentTarget.style.color=t.accent;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.textMuted;}}>
            View all positions →
          </button>
        </div>
      </div>

      {/* Recent trades */}
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase'}}>Recent Trades</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:11,color:t.textDim}}>Click a row to inspect</span>
            <Badge t={t}>{closedTrades.length} total</Badge>
          </div>
        </div>
        <Table t={t} columns={['Time','Symbol','Side','Entry','Exit','P&L','Confidence','Duration']}
          rows={closedTrades.slice(0,8)}
          renderRow={(row,i,t)=>(
            <tr key={i} style={{borderBottom:`1px solid ${t.border}33`,cursor:'pointer',transition:'background 0.12s'}}
              onClick={()=>setDrawerTrade(row)}
              onMouseEnter={e=>e.currentTarget.style.background=t.cardHover}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <td style={{padding:'9px 12px',color:t.textDim,fontSize:12}}>{row.time}</td>
              <td style={{padding:'9px 12px',color:t.text,fontWeight:600}}>{row.symbol}</td>
              <td style={{padding:'9px 12px'}}><Badge color={row.side==='Long'?'green':'red'} t={t}>{row.side}</Badge></td>
              <td style={{padding:'9px 12px',color:t.textDim,fontFamily:'monospace',fontSize:12}}>${row.entry.toLocaleString()}</td>
              <td style={{padding:'9px 12px',color:t.textDim,fontFamily:'monospace',fontSize:12}}>${row.exit.toLocaleString()}</td>
              <td style={{padding:'9px 12px',color:row.pnl>=0?t.green:t.red,fontWeight:700,fontFamily:'monospace'}}>{fmt(row.pnl)}</td>
              <td style={{padding:'9px 12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:40,height:4,background:t.border,borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:row.confidence+'%',background:row.confidence>=70?t.green:t.accent,borderRadius:2}}/>
                  </div>
                  <span style={{fontSize:11,color:t.textDim}}>{row.confidence}%</span>
                </div>
              </td>
              <td style={{padding:'9px 12px',color:t.textMuted,fontSize:12}}>{row.duration}</td>
            </tr>
          )}
        />
      </div>
      <TradeDrawer trade={drawerTrade} t={t} onClose={()=>setDrawerTrade(null)}/>
    </div>
  );
}

function HistorySection({t,trades=[],isMobile}) {
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [drawerTrade,setDrawerTrade]=useState(null);
  const card={background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'20px'};
  const btnStyle=act=>({padding:'5px 14px',borderRadius:6,border:`1px solid ${act?t.accent:t.border}`,background:act?t.accentDim:'transparent',color:act?t.accent:t.textMuted,cursor:'pointer',fontSize:12,fontWeight:600,transition:'all 0.15s',fontFamily:'inherit'});
  const closedTrades=trades.filter(tr=>tr.status==='closed');

  const filtered=useMemo(()=>closedTrades.filter(tr=>{
    if(filter!=='All'&&tr.side!==filter) return false;
    if(search&&!tr.symbol.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[filter,search,trades]);

  const totalPnL=filtered.reduce((a,b)=>a+b.pnl,0);
  const wins=filtered.filter(tr=>tr.pnl>0).length;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:isMobile?10:12}}>
        <StatCard t={t} label="Total Trades" value={filtered.length} sub="Closed"/>
        <StatCard t={t} label="Win Rate" value={(wins/Math.max(filtered.length,1)*100).toFixed(1)+'%'} sub={`${wins} wins`}/>
        <StatCard t={t} label="Total P&L" value={fmt(totalPnL)} sub="Net" accent delta={totalPnL}/>
        <StatCard t={t} label="Avg P&L" value={fmt(totalPnL/Math.max(filtered.length,1))} sub="Per trade" accent delta={totalPnL/Math.max(filtered.length,1)}/>
      </div>
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,gap:12,flexWrap:'wrap'}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase'}}>Trade History</div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {/* Search */}
            <div style={{position:'relative'}}>
              <svg style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="5" cy="5" r="3.5" stroke={t.textMuted} strokeWidth="1.3"/>
                <path d="M8 8l2 2" stroke={t.textMuted} strokeWidth="1.3" strokeLinecap="round"/>
              </svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search symbol…"
                style={{background:t.bg,border:`1px solid ${t.border}`,borderRadius:6,padding:'5px 10px 5px 26px',color:t.text,fontSize:12,outline:'none',fontFamily:'inherit',width:160,transition:'border 0.15s'}}
                onFocus={e=>e.target.style.borderColor=t.accent}
                onBlur={e=>e.target.style.borderColor=t.border}/>
            </div>

function AnalyticsSection({t,trades=[],status,wsConnected,isMobile}) {
  const card={background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:'20px'};
  const closedTrades=trades.filter(tr=>tr.status==='closed');
  const wins=closedTrades.filter(tr=>tr.pnl>0).length;
  const totalWon=closedTrades.filter(tr=>tr.pnl>0).reduce((a,b)=>a+b.pnl,0);
  const totalLost=closedTrades.filter(tr=>tr.pnl<0).reduce((a,b)=>a+Math.abs(b.pnl),0);
  const lw=closedTrades.filter(tr=>tr.side==='Long').length;
  const sw=closedTrades.filter(tr=>tr.side==='Short').length;
  const lwins=closedTrades.filter(tr=>tr.side==='Long'&&tr.pnl>0).length;
  const swins=closedTrades.filter(tr=>tr.side==='Short'&&tr.pnl>0).length;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:isMobile?10:12}}>
        <StatCard t={t} label="Total Won" value={fmt(totalWon)} sub={`${wins} trades`} accent delta={1}/>
        <StatCard t={t} label="Total Lost" value={fmt(-totalLost)} sub={`${closedTrades.length-wins} trades`} accent delta={-1}/>
        <StatCard t={t} label="Profit Factor" value={totalLost>0?(totalWon/totalLost).toFixed(2)+'×':'—'} sub="Won ÷ Lost"/>
        <StatCard t={t} label="Expectancy" value={closedTrades.length>0?fmt((totalWon-totalLost)/closedTrades.length):'$0.00'} sub="Per trade" accent delta={(totalWon-totalLost)/Math.max(closedTrades.length,1)}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:16}}>
        <div style={card}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>Win Rate Breakdown</div>
          <div style={{display:'flex',alignItems:'center',gap:20}}>
            <div style={{width:130,height:130,flexShrink:0}}><WinRateChart t={t} trades={closedTrades}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div>
                <div style={{fontSize:28,fontWeight:800,color:t.green}}>{closedTrades.length>0?(wins/closedTrades.length*100).toFixed(1):0}%</div>
                <div style={{fontSize:12,color:t.textDim}}>Overall win rate</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div style={{padding:'10px',background:t.greenDim,borderRadius:8,border:`1px solid ${t.green}22`}}>
                  <div style={{fontSize:16,fontWeight:700,color:t.green}}>{lw>0?(lwins/lw*100).toFixed(0):0}%</div>
                  <div style={{fontSize:10,color:t.textDim}}>Long win</div>
                </div>
                <div style={{padding:'10px',background:t.accentDim,borderRadius:8,border:`1px solid ${t.accent}22`}}>
                  <div style={{fontSize:16,fontWeight:700,color:t.accent}}>{sw>0?(swins/sw*100).toFixed(0):0}%</div>
                  <div style={{fontSize:10,color:t.textDim}}>Short win</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div style={card}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>P&L by Direction</div>
          <div style={{height:170}}><DirectionChart t={t} trades={closedTrades}/></div>
        </div>
      </div>

      {/* Heatmap */}
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase'}}>Daily P&L Heatmap</div>
          <span style={{fontSize:11,color:t.textDim}}>Last 90 days — hover for details</span>
        </div>

      </div>

      <div style={card}>
        <div style={{fontSize:11,fontWeight:600,color:t.textMuted,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:16}}>Bot Health</div>
        <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:isMobile?10:12}}>
          {(()=>{
            const ready=status?.readiness;
            const tradesCompleted=ready?.tradesCompleted??0;
            const tradesRequired=ready?.tradesRequired??100;
            const isReady=ready?.isReady??false;
            const openPos=status?.openPositions??0;
            const monitored=status?.monitoredPairs?.length??0;
            const avgConf=closedTrades.length>0?(closedTrades.reduce((a,b)=>a+b.confidence,0)/closedTrades.length).toFixed(0)+'%':'—';
            const items=[
              {label:'Status',          value:status?.isRunning?'RUNNING':'STOPPED', sub:status?.mode??'—',              ok:status?.isRunning??false},
              {label:'Mode',            value:status?.mode?.toUpperCase()??'—',       sub:status?.marginMode??'isolated',  ok:true},

              {label:'Monitored Pairs', value:String(monitored),                      sub:'Active scan',                   ok:monitored>0},
              {label:'Avg Confidence',  value:avgConf,                                sub:'Last trades',                   ok:true},

              <div style={{fontSize:10,fontWeight:600,color:t.textMuted,letterSpacing:'0.06em',textTransform:'uppercase'}}>{item.label}</div>

            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CredentialsForm({t,inp,lbl,isMobile}) {
  const [cur,setCur]=useState('');
  const [usr,setUsr]=useState('');
  const [pwd,setPwd]=useState('');
  const [pwd2,setPwd2]=useState('');
  const [msg,setMsg]=useState(null); // {text, ok}
  const [busy,setBusy]=useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setMsg(null);
    if(pwd!==pwd2){setMsg({text:'New passwords do not match',ok:false});return;}
    if(pwd.length<8){setMsg({text:'Password must be at least 8 characters',ok:false});return;}
    setBusy(true);
    try {
      const r=await fetch('/api/settings/credentials',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:cur,newUsername:usr,newPassword:pwd})});
      const d=await r.json();
      if(d.ok){
        setMsg({text:'Credentials updated — signing you out…',ok:true});
        setCur('');setUsr('');setPwd('');setPwd2('');
        setTimeout(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login.html';},1800);
      } else {
        setMsg({text:d.message||'Update failed',ok:false});
      }
    } catch(_){setMsg({text:'Network error',ok:false});}
    setBusy(false);
  }

  const fieldStyle={...inp};
  return (
    <form onSubmit={handleSubmit}>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12,marginBottom:12}}>
        <div>
          <label style={lbl}>Current Password</label>
          <input style={fieldStyle} type="password" value={cur} onChange={e=>setCur(e.target.value)} placeholder="Current password" required
            onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        </div>
        <div>
          <label style={lbl}>New Username</label>
          <input style={fieldStyle} type="text" value={usr} onChange={e=>setUsr(e.target.value)} placeholder="New username" required
            onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        </div>
        <div>
          <label style={lbl}>New Password</label>
          <input style={fieldStyle} type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Min 8 characters" required
            onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        </div>
        <div>
          <label style={lbl}>Confirm New Password</label>
          <input style={fieldStyle} type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Repeat new password" required
            onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        </div>
      </div>
      {msg && (
        <div style={{marginBottom:12,padding:'9px 14px',borderRadius:7,background:msg.ok?t.greenDim:t.redDim,border:`1px solid ${msg.ok?t.green:t.red}33`,fontSize:12,color:msg.ok?t.green:t.red}}>
          {msg.text}
        </div>
      )}
      <button type="submit" disabled={busy} style={{padding:'9px 22px',borderRadius:7,border:'none',background:t.accent,color:t.bg,fontWeight:700,fontSize:13,cursor:busy?'not-allowed':'pointer',fontFamily:'inherit',opacity:busy?0.6:1}}>
        {busy?'Saving…':'Update Credentials'}
      </button>
    </form>
  );
}

        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:28,height:28,borderRadius:7,background:t.accentDim,border:`1px solid ${t.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 9.5L4.5 6L7 8L12.5 2.5" stroke={t.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M10 2.5h2.5V5" stroke={t.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:t.text,letterSpacing:'0.05em'}}>FUTURES BOT</div>
            <div style={{fontSize:10,color:t.textMuted}}>Bybit Testnet</div>
          </div>
        </div>
      </div>

      <nav style={{padding:'8px 8px',flex:1,display:'flex',flexDirection:'column',gap:1,overflowY:'auto'}}>
        {NAV.map(item=>{
          const isActive=active===item.id;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:7,border:'none',background:isActive?t.navActive:'transparent',color:isActive?t.accent:t.textDim,cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:13,fontWeight:isActive?600:400,transition:'all 0.15s',width:'100%',borderLeft:isActive?`2px solid ${t.accent}`:'2px solid transparent'}}
              onMouseEnter={e=>{if(!isActive){e.currentTarget.style.background=t.cardHover;e.currentTarget.style.color=t.text;}}}
              onMouseLeave={e=>{if(!isActive){e.currentTarget.style.background='transparent';e.currentTarget.style.color=t.textDim;}}}>
              <NavIcon id={item.id} t={t} active={isActive}/>
              <span style={{flex:1}}>{item.label}</span>
              {item.id==='positions'&&openPositions>0 && <span style={{fontSize:10,fontWeight:700,color:t.green,background:t.greenDim,padding:'1px 6px',borderRadius:10}}>{openPositions}</span>}
            </button>
          );
        })}
      </nav>

      <div style={{padding:'12px',borderTop:`1px solid ${t.sidebarBorder}`}}>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:9,padding:'12px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}><StatusDot active={running} t={t}/><span style={{fontSize:11,fontWeight:700,color:running?t.green:t.textMuted}}>{running?'RUNNING':'STOPPED'}</span></div>
            <Badge t={t}>PAPER</Badge>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            <button onClick={()=>setRunning(true)} style={{padding:'7px',borderRadius:6,border:`1px solid ${running?t.border:t.green}`,background:running?'transparent':t.greenDim,color:running?t.textMuted:t.green,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit',transition:'all 0.15s'}}>▶ Start</button>
            <button onClick={()=>setRunning(false)} style={{padding:'7px',borderRadius:6,border:`1px solid ${!running?t.border:t.red}`,background:!running?'transparent':t.redDim,color:!running?t.textMuted:t.red,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit',transition:'all 0.15s'}}>■ Stop</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function NotificationsTray({t}) {
  const [open,setOpen]=useState(false);
  const [notes,setNotes]=useState([]);
  const unread=notes.filter(n=>!n.read).length;
  const typeColor={trade:t.green,profit:t.green,loss:t.red,system:t.accent2,ai:t.accent};
  const ref=useRef(null);

  useEffect(()=>{
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={()=>{setOpen(o=>!o);setNotes(n=>n.map(x=>({...x,read:true})));}} style={{background:'transparent',border:`1px solid ${open?t.accent:t.border}`,borderRadius:7,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',transition:'all 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor=t.accent;}}
        onMouseLeave={e=>{if(!open)e.currentTarget.style.borderColor=t.border;}}>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M7.5 1.5C5 1.5 3.5 3.5 3.5 6v2L2 10h11l-1.5-2V6C11.5 3.5 10 1.5 7.5 1.5Z" stroke={t.textDim} strokeWidth="1.3" fill="none"/>
          <path d="M6.2 10.5c0 .7.6 1.3 1.3 1.3s1.3-.6 1.3-1.3" stroke={t.textDim} strokeWidth="1.2"/>
        </svg>
        {unread>0 && <span style={{position:'absolute',top:-3,right:-3,width:16,height:16,borderRadius:'50%',background:t.red,color:'#fff',fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${t.bg}`}}>{unread}</span>}
      </button>
      {open && (
        <div style={{position:'absolute',top:42,right:0,width:300,background:t.sidebar,border:`1px solid ${t.border}`,borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,0.5)',zIndex:400,overflow:'hidden',animation:'fadeUp 0.18s ease both'}}>
          <div style={{padding:'12px 14px',borderBottom:`1px solid ${t.border}`,fontSize:11,fontWeight:700,color:t.textMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>Notifications</div>
          {notes.map(n=>(
            <div key={n.id} style={{padding:'11px 14px',borderBottom:`1px solid ${t.border}33`,display:'flex',gap:10,alignItems:'flex-start',transition:'background 0.12s'}}
              onMouseEnter={e=>e.currentTarget.style.background=t.cardHover}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:7,height:7,borderRadius:'50%',background:typeColor[n.type]||t.accent,marginTop:4,flexShrink:0,boxShadow:`0 0 5px ${typeColor[n.type]||t.accent}`}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:t.text,lineHeight:1.4}}>{n.msg}</div>
                <div style={{fontSize:10,color:t.textMuted,marginTop:2}}>{n.time}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── TOPBAR ───────────────────────────────────────────────────────────────────
const PAGE_TITLES={dashboard:'Dashboard',positions:'Open Positions',history:'Trade History',analytics:'Analytics',logs:'Live Logs',settings:'Settings'};
const KB_HINTS={d:'Dashboard',p:'Positions',h:'History',a:'Analytics',l:'Logs',s:'Settings'};

function TopBar({t,active,running,isMobile}) {
  const [time,setTime]=useState(new Date());
  const [showKb,setShowKb]=useState(false);
  useEffect(()=>{const id=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(id);},[]);

  if(isMobile) return (
    <div style={{height:52,borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',flexShrink:0,background:t.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <div style={{width:24,height:24,borderRadius:6,background:t.accentDim,border:`1px solid ${t.accent}44`,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1.5 9.5L4.5 6L7 8L12.5 2.5" stroke={t.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M10 2.5h2.5V5" stroke={t.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <span style={{fontSize:14,fontWeight:700,color:t.text}}>{PAGE_TITLES[active]}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}><StatusDot active={running} t={t}/><span style={{fontSize:11,color:running?t.green:t.textMuted,fontWeight:600}}>{running?'Live':'Off'}</span></div>
        <button onClick={async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login.html';}}
          style={{background:'transparent',border:`1px solid ${t.border}`,borderRadius:6,padding:'4px 8px',color:t.textMuted,fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>
          Out
        </button>
      </div>
    </div>
  );

  return (
    <div style={{height:52,borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 22px',flexShrink:0,background:t.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:15,fontWeight:700,color:t.text}}>{PAGE_TITLES[active]}</span>
        <span style={{fontSize:11,color:t.textMuted}}>v2.1.0</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}><StatusDot active={running} t={t}/><span style={{fontSize:12,color:running?t.green:t.textMuted,fontWeight:600}}>{running?'Bot active':'Bot stopped'}</span></div>
        <div style={{width:1,height:18,background:t.border}}/>
        <span style={{fontSize:12,color:t.textMuted,fontFamily:'monospace'}}>{time.toLocaleTimeString('en-US',{hour12:false})}</span>
        <div style={{padding:'4px 10px',borderRadius:6,background:t.accentDim,border:`1px solid ${t.accent}33`,fontSize:11,fontWeight:700,color:t.accent,letterSpacing:'0.05em'}}>TESTNET</div>
        <NotificationsTray t={t}/>
        <button onClick={async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login.html';}}
          style={{background:'transparent',border:`1px solid ${t.border}`,borderRadius:7,padding:'4px 10px',color:t.textMuted,fontSize:11,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=t.red;e.currentTarget.style.color=t.red;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.textMuted;}}>
          Sign out
        </button>
        {/* KB shortcuts hint */}
        <button onClick={()=>setShowKb(o=>!o)} style={{background:'transparent',border:`1px solid ${showKb?t.accent:t.border}`,borderRadius:7,padding:'4px 10px',color:t.textMuted,fontSize:11,cursor:'pointer',fontFamily:'monospace',transition:'all 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=t.accent}
          onMouseLeave={e=>{if(!showKb)e.currentTarget.style.borderColor=t.border;}}>⌨ Keys</button>
        {showKb && (
          <div style={{position:'absolute',top:56,right:22,background:t.sidebar,border:`1px solid ${t.border}`,borderRadius:9,padding:'14px',zIndex:300,boxShadow:'0 8px 28px rgba(0,0,0,0.5)',animation:'fadeUp 0.18s ease both',minWidth:180}}>
            <div style={{fontSize:10,fontWeight:700,color:t.textMuted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Keyboard Shortcuts</div>
            {Object.entries(KB_HINTS).map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:12,color:t.textDim}}>{v}</span>
                <kbd style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:4,padding:'2px 8px',fontSize:11,color:t.accent,fontFamily:'monospace',fontWeight:700}}>{k}</kbd>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "slate",
  "compactMode": false
}/*EDITMODE-END*/;

const PAGE_KEYS={d:'dashboard',p:'positions',h:'history',a:'analytics',l:'logs',s:'settings'};

// ─── MOBILE BOTTOM NAV ───────────────────────────────────────────────────────
function BottomNav({t,active,setActive,openPositions}) {
  const items=[
    {id:'dashboard',label:'Home'},
    {id:'positions',label:'Positions'},
    {id:'history',label:'History'},
    {id:'analytics',label:'Analytics'},
    {id:'logs',label:'Logs'},
    {id:'settings',label:'Settings'},
  ];
  return (
    <div className="safe-bottom" style={{position:'fixed',bottom:0,left:0,right:0,background:t.sidebar,borderTop:`1px solid ${t.border}`,display:'flex',zIndex:200,boxShadow:'0 -4px 20px rgba(0,0,0,0.4)'}}>
      {items.map(item=>{
        const isActive=active===item.id;
        return (
          <button key={item.id} onClick={()=>setActive(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,padding:'8px 2px 10px',background:'transparent',border:'none',cursor:'pointer',color:isActive?t.accent:t.textMuted,position:'relative',transition:'color 0.15s'}}>
            {item.id==='positions'&&openPositions>0 && <span style={{position:'absolute',top:6,right:'50%',marginRight:-14,width:14,height:14,borderRadius:'50%',background:t.green,color:'#fff',fontSize:8,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{openPositions}</span>}
            <NavIcon id={item.id} t={t} active={isActive}/>
            <span style={{fontSize:9,fontWeight:isActive?700:400,letterSpacing:'0.02em'}}>{item.label}</span>
            {isActive && <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:24,height:2,borderRadius:2,background:t.accent}}/>}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [active,setActive]=useState('dashboard');
  const t=THEMES[tweaks.theme]||THEMES.slate;
  const {status,trades,liveLogs,wsConnected}=useLiveData();
  const running=status?.isRunning??false;
  const {w}=useWindowSize();
  const isMobile=w<768;

  async function handleStart() { try { await fetch('/api/start',{method:'POST'}); } catch(_){} }
  async function handleStop()  { try { await fetch('/api/stop', {method:'POST'}); } catch(_){} }

  useEffect(()=>{
    function handler(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if(PAGE_KEYS[e.key]) setActive(PAGE_KEYS[e.key]);
    }
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);

  const sections={dashboard:DashboardSection,positions:PositionsSection,history:HistorySection,analytics:AnalyticsSection,logs:LogsSection,settings:SettingsSection};
  const CurrentSection=sections[active];
  const sectionProps={t,setPage:setActive,status,trades,liveLogs,wsConnected,isMobile};

  return (
    <div style={{display:'flex',height:'100vh',background:t.bg,color:t.text,overflow:'hidden',position:'relative'}}>
      {!isMobile && <Sidebar t={t} active={active} setActive={setActive} running={running} setRunning={v=>v?handleStart():handleStop()} openPositions={status?.openPositions??0}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar t={t} active={active} running={running} isMobile={isMobile}/>
        <main style={{flex:1,overflowY:'auto',padding:isMobile?'12px':'22px',paddingBottom:isMobile?'72px':isMobile?'12px':'22px'}}>
          <CurrentSection {...sectionProps}/>
        </main>
      </div>
      {isMobile && <BottomNav t={t} active={active} setActive={setActive} openPositions={status?.openPositions??0}/>}
      {!isMobile && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Theme">
            <TweakRadio label="Color Theme" value={tweaks.theme} onChange={v=>setTweak('theme',v)} options={[{value:'slate',label:'Slate Pro'},{value:'terminal',label:'Terminal'},{value:'carbon',label:'Carbon'}]}/>
          </TweakSection>
          <TweakSection title="Layout">
            <TweakToggle label="Compact Mode" value={tweaks.compactMode} onChange={v=>setTweak('compactMode',v)}/>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
